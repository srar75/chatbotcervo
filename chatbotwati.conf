<VirtualHost *:80>
    ServerName chatbot.cervotravel.app
    
    # WSGI Configuration con auto-reload
    WSGIDaemonProcess cervobot user=www-data group=www-data threads=5 python-home=/home/ftp/watiapp/venv python-path=/home/ftp/watiapp maximum-requests=100
    WSGIScriptAlias / /home/ftp/watiapp/wsgi.py
    WSGIPassAuthorization On
    WSGIScriptReloading On

    <Directory /home/ftp/watiapp>
        WSGIProcessGroup cervobot
        WSGIApplicationGroup %{GLOBAL}
        Require all granted
    </Directory>

    # Logs en la carpeta del proyecto
    ErrorLog /home/ftp/watiapp/apache_error.log
    CustomLog /home/ftp/watiapp/apache_access.log combined

    # Security Headers
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
</VirtualHost>
