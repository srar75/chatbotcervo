<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦌 Cervo Bot - Test Automático</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1c2e 0%, #2d3561 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        .header p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .chat-container {
            height: 500px;
            overflow-y: auto;
            padding: 20px;
            background: #1a1c2e;
        }
        .message {
            margin-bottom: 15px;
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 85%;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .bot-message {
            background: rgba(255,255,255,0.1);
            color: #e0e0e0;
            border-bottom-left-radius: 5px;
            white-space: pre-wrap;
        }
        .input-container {
            padding: 20px;
            background: rgba(0,0,0,0.3);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        button {
            padding: 15px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .status {
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            color: #4ade80;
            background: rgba(74, 222, 128, 0.1);
        }
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦌 Cervo Bot - Test Automático</h1>
            <p>Chatbot de Reservaciones de Vuelos</p>
        </div>
        <div class="status">⚡ EJECUTANDO AUTOMÁTICAMENTE</div>
        <div class="chat-container" id="chat">
            <div class="message bot-message">
🦌 Iniciando prueba automática del bot...
            </div>
        </div>
        <div class="input-container">
            <input type="text" id="message" placeholder="Escribe tu mensaje..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()">Enviar</button>
        </div>
    </div>
    
    <script>
        const chat = document.getElementById('chat');
        const messageInput = document.getElementById('message');
        const testPhone = '584121234567';
        
        function addMessage(text, isUser = false) {
            const msgClass = isUser ? 'user-message' : 'bot-message';
            chat.innerHTML += `<div class="message ${msgClass}">${text}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
        
        function addLoading() {
            chat.innerHTML += `<div class="message bot-message" id="loading"><span class="loading"></span> Procesando...</div>`;
            chat.scrollTop = chat.scrollHeight;
        }
        
        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }
        
        async function sendTestMessage(message) {
            addMessage(message, true);
            addLoading();
            
            try {
                const response = await fetch('/test', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: testPhone,
                        message: message 
                    })
                });
                
                const data = await response.json();
                removeLoading();
                
                const botResponse = data.result?.response || 'Error: Sin respuesta';
                addMessage(botResponse);
                
                return data;
            } catch (error) {
                removeLoading();
                addMessage(`❌ Error: ${error.message}`);
                throw error;
            }
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            messageInput.value = '';
            await sendTestMessage(message);
        }
        
        // EJECUCIÓN AUTOMÁTICA
        async function runAutoTest() {
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Test 1: Activar bot
            addMessage('📋 Test 1: Activando bot con "cervo ai"');
            await sendTestMessage('cervo ai');
            await new Promise(resolve => setTimeout(resolve, 2000));
            
            // Test 2: Buscar vuelos
            addMessage('📋 Test 2: Buscando vuelos CCS-PMV');
            await sendTestMessage('Quiero volar de Caracas a Margarita mañana');
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            addMessage('✅ Prueba automática completada. Ahora puedes escribir tus propios mensajes.', false);
        }
        
        // Iniciar test automáticamente al cargar
        window.addEventListener('load', () => {
            runAutoTest();
        });
    </script>
</body>
</html>
